name: Deploy to production

# One click: Actions tab -> "Deploy to production" -> Run workflow.
# Nothing fires on push -- you choose exactly when to ship (a redeploy wipes
# in-memory scenes, so never run this during a live attendee session).
on:
  workflow_dispatch: {}

# Never let two deploys overlap on the single shared server.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # The "see how it does NOT work" gate: a broken tool fails here and the
  # deploy job below never runs.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run tests
        run: dotnet test tests/SpatialAI.Tests/SpatialAI.Tests.csproj -c Release

  deploy:
    needs: test              # broken change -> red pipeline -> NO deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust the server host key
        run: ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # Mirror the code to /opt/spatial. No --delete, and .env + the Docker
      # data volume are excluded, so the server's Anthropic/Brevo keys and all
      # saved spaces are never touched.
      - name: Sync code to server
        run: |
          rsync -az --no-perms --omit-dir-times \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'bin' \
            --exclude 'obj' \
            --exclude '*.db' \
            --exclude '*.db-*' \
            --exclude 'spaces' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/spatial/"

      - name: Build and restart the container
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'cd /opt/spatial && docker compose up -d --build'

      # Confirm the live site answers after the redeploy.
      - name: Smoke check
        run: curl -fsS -o /dev/null https://spatial.dotnet-talk.com/register.html
